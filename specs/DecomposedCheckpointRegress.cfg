\* M15 ph71 — the REGRESS BITE (INV_NoCommittedLoss). Seed="regress" makes Crash resume set
\* the in-memory level to CommittedFrontier-1 (below a durably-committed level) — a resume that
\* LOSES a committed level. INV_NoCommittedLoss (level >= CommittedFrontier) MUST Falsify. The
\* break is ISOLATED: `committed` is untouched, so INV_NoPartialLevel and INV_PrefixClosed stay
\* clean. Required outcome: RED on INV_NoCommittedLoss. This is the second break-seed the reviewer
\* flagged as missing (ph71-F1) — a NoCommittedLoss GREEN without it would be true-by-construction
\* (correct Crash sets level EXACTLY to the frontier, so the >= never has slack). MaxCrashes=1 (a
\* crash is required to exercise resume at all).
SPECIFICATION Spec
CONSTANTS
    Levels = 3
    RowsPerLevel = 2
    MaxCrashes = 1
    Seed = "regress"
INVARIANTS
    TypeOK
    INV_NoPartialLevel
    INV_PrefixClosed
    INV_NoCommittedLoss
