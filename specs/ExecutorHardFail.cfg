\* TLC config (run against MCExecutor.tla) — hard-failure scenario:
\* a normal (non-coe) node fails.
\* Diamond  n1 -> {n2, n3} -> n4.  n2 is a HARD node and FAILS.
\* Expected: n2 fails -> halted (fail-fast); n4 depends on the hard-failed n2,
\* so it never starts and is skipped. Exercises HardFailureHalts non-vacuously
\* and failure-safety (no downstream of a hard failure runs).
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {}
    FailSet = {n2}
    MaxConc = 2

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts

PROPERTIES
    Termination
