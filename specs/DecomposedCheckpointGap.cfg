\* M15 ph71 — the GAP BITE (INV_PrefixClosed). Seed="gap" makes the first checkpoint commit
\* level 2's rows while level 1 stays empty -> a NON-CONTIGUOUS durable frontier (a higher
\* whole level committed with a lower level absent). INV_PrefixClosed MUST Falsify. The break
\* is ISOLATED: every level commits WHOLE (no partial), so INV_NoPartialLevel stays clean, and
\* the gap does not force a resume regression, so INV_NoCommittedLoss stays clean. Required
\* outcome: RED on INV_PrefixClosed. This is the break-seed the reviewer flagged as missing
\* (ph71-F1) — without it, a PrefixClosed GREEN would be uninformative (true-by-construction).
SPECIFICATION Spec
