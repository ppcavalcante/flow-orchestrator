\* SEED-BREAK (M18 ph88, NoResumeAfterCancel — MODE-b, the ph87 BLOCKER-2 crux): CancelGate=FALSE drops the
\* real reclaim-terminalizes-cancelled arm → a cancel_requested LAPSED-claimed row is re-offered by Reclaim →
\* claimed (resumed as fresh progressing work) instead of → cancelled → NoResumeAfterCancel FALSIFIES.
\*
\* ISOLATION CHECK (the non-redundancy proof): this cfg asserts ALL FIVE safety invariants, not just the new
\* one. The break must Falsify ONLY NoResumeAfterCancel — C2 (NoReclaimOfTerminal), F1 (NoSupersededTerminalize),
\* NoLostWork, and AtMostOneClaimedWriter must ALL still HOLD on this same break (the violation lives in the
\* non-terminal everTerminal=FALSE space those four are blind to). If any of the other four also reddens, the
\* break is not isolating the new property — the break is wrong, not the invariant.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2}
    MaxToken = 3
    TokenGuard = TRUE
    TerminalReclaimBlocked = TRUE
    ReclaimEnabled = TRUE
    WinnerUnique = TRUE
    CancelGate = FALSE
INVARIANTS
    NoReclaimOfTerminal
    AtMostOneClaimedWriter
    NoSupersededTerminalize
    NoLostWork
    NoResumeAfterCancel
