\* TLC config (run against MCExecutor.tla) — primary scenario:
\* continue-on-error CONTINUES the workflow.
\* Diamond  n1 -> {n2, n3} -> n4.  n2 is continue-on-error and FAILS.
\* Expected: n2 fails (no halt); n4 still runs because n2 is a resolved
\* (coe-failed) dependency [DEC-P21-depguard]. Exercises the coe-unblock arm.
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {n2}
    FailSet = {n2}
    MaxConc = 2

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts

PROPERTIES
    Termination
