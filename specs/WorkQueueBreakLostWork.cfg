\* SEED-BREAK (NoLostWork): ReclaimEnabled=FALSE removes the reclaim path →
\* a lapsed claimed row is a dead end (abandoned, non-terminal) → NoLostWork FALSIFIES.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2}
    MaxToken = 3
    TokenGuard = TRUE
    TerminalReclaimBlocked = TRUE
    ReclaimEnabled = FALSE
    WinnerUnique = TRUE
INVARIANTS
    NoLostWork
