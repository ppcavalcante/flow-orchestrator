\* M12 diamond-saga config (phase 50). s -> {a,b} -> t; t fails -> rollback.
\* MaxCrashes = 1 is the exhaustive config (DEC-M12-P50-CRASHROLLBACK).
CONSTANTS
    s = s
    a = a
    b = b
    t = t
    ContinueOnError = {}
    FailSet = {t}
    MaxConc = 2
    MaxCrashes = 1
    Suspendable = {}
    TimerNodes = {}
    MaxTick = 0
    SagaNodes = {s, a, b, t}
    CompFailSet = {}
    SagaTrigger = "failure"

SPECIFICATION Spec

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    ExecFidelity
    HardFailureHalts
    NoResurrection
    NoDoubleCommitSaga
    ReverseTopoOrderRespected
    NoUncompletedNodeCompensated
    CrashSafeRollback
    HonestPartition
    TriggerCauseFidelity

PROPERTIES
    Termination
    EveryCompletedCompensableCompensatedOnce
