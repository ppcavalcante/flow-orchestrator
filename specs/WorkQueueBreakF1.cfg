\* SEED-BREAK (F1): TokenGuard=FALSE removes the ph82-F1 terminalize token-guard →
\* a superseded worker terminalizes the owner's row → NoSupersededTerminalize FALSIFIES.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2}
    MaxToken = 3
    TokenGuard = FALSE
    TerminalReclaimBlocked = TRUE
    ReclaimEnabled = TRUE
    WinnerUnique = TRUE
INVARIANTS
    NoSupersededTerminalize
