\* M21 ph108 SEED-THE-BREAK: re-expand-on-resume (AtomicExpansion = FALSE). A crash re-clears the
\* {N} journal -> the expander re-runs on resume -> expandCount = 2 -> ExactlyNSpawn MUST Falsify.
\* Proves that journaling N ONCE (never re-running the expander on resume) is load-bearing for a
\* runtime-variable-N fan-out — the moat's no-replay / no-determinism-tax leg, machine-checked.
SPECIFICATION Spec
CONSTANTS
    Branches = {b1, b2, b3}
    MaxCrashes = 2
    AtomicExpansion = FALSE
INVARIANTS
    TypeOK
    ExactlyNSpawn
    FanInWaitsForAll
