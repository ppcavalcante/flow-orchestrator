\* M12 diamond-saga CANCEL config (phase 50). A caller-cancel (not a forward failure)
\* aborts the run mid-flight -> rollback with cause "canceled". FailSet = {} (no forward
\* failure); Cancel marks the running node failed but journals triggerCause = "canceled"
\* -> a Failed node exists WITH cause # failure: the exact TriggerCauseFidelity shape (the
\* ph48-F2 property caught formally). Cancel is UNFAIR (optional), so the completeness
\* LIVENESS is NOT checked here (checked in the failure config); this config pins the
\* SAFETY invariants + cause fidelity across a crash. MaxCrashes = 1 (DEC-M12-P50-CRASHROLLBACK).
CONSTANTS
    s = s
    a = a
    b = b
    t = t
    ContinueOnError = {}
    FailSet = {}
    MaxConc = 2
    MaxCrashes = 1
    Suspendable = {}
    TimerNodes = {}
    MaxTick = 0
    SagaNodes = {s, a, b, t}
    CompFailSet = {}
    SagaTrigger = "canceled"

SPECIFICATION Spec

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    ExecFidelity
    HardFailureHalts
    NoResurrection
    NoDoubleCommitSaga
    ReverseTopoOrderRespected
    NoUncompletedNodeCompensated
    CrashSafeRollback
    HonestPartition
    TriggerCauseFidelity

PROPERTIES
    Termination
