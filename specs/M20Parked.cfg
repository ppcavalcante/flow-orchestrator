\* M20 ph102 parked-exempt liveness arm — the CORRECT model. With ParkedExempt=TRUE a parked child
\* is cap-exempt (DEC-P98-PARKED-COLUMN) -> the system is DEADLOCK-FREE (every path reaches AllDone).
\* TLC deadlock detection must find NO deadlock; NoWedge holds. Exhaustive at {p1,p2} x Cap=1.
SPECIFICATION Spec
CONSTANTS
    Parents = {p1, p2}
    Cap = 1
    ParkedExempt = TRUE
INVARIANTS
    TypeOK
    NoWedge
