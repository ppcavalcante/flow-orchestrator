\* M15 ph71 — decomposed per-level checkpoint, ROW granularity, CORRECT store.
\* Exhaustive @ MaxCrashes=1 (the M10/M12 standard). RowsPerLevel=2 is the minimal
\* bound at which a PROPER SUBSET of a level exists (so the torn bite is expressible);
\* Levels=3 gives multiple crash-boundaries. Bounded so MaxCrashes=1 stays exhaustive.
\* ALL THREE invariants must be GREEN here (correct store). Each is bite-proven RED by
\* its own break-seed cfg: torn->NoPartialLevel, gap->PrefixClosed, regress->NoCommittedLoss.
SPECIFICATION Spec
CONSTANTS
    Levels = 3
    RowsPerLevel = 2
    MaxCrashes = 1
    Seed = "none"
INVARIANTS
    TypeOK
    INV_NoPartialLevel
    INV_PrefixClosed
    INV_NoCommittedLoss
