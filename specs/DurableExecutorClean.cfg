\* TLC config (run against MCDurableExecutor.tla) — clean crash-resume scenario:
\* no node fails; a single process crash may occur at ANY point.
\* Diamond  n1 -> {n2, n3} -> n4.  FailSet = {} (every node succeeds).
\* This is the purest resume-equivalence case: crash at any barrier/in-flight,
\* recover from the last checkpoint, converge to the same all-done final state.
\* The phantom-checkpoint mutation bites here most clearly (ExecFidelity).
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {}
    FailSet = {}
    MaxConc = 2
    MaxCrashes = 1

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    StatusConvergence

PROPERTIES
    Termination
