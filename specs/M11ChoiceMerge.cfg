\* M11 OR-join config (run against MCM11ChoiceMerge.tla) — phase 44 capstone.
\* Single Choice c / branches {bA,bB,bC} / Merge m over {bA,bB}; FailSet={bA}.
\* Crash-free (MaxCrashes=0). Exercises the 4 M11 invariants + the separator +
\* the anti-vacuity all-bypassed case via the nondet branch pick. The crash x
\* choice bounded-exhaustive scenario is M11CrashChoice.cfg (DEC-M11-P44-CRASHCHOICE).
SPECIFICATION Spec

CONSTANTS
    c = c
    bA = bA
    bAi = bAi
    bB = bB
    bBi = bBi
    bC = bC
    m = m
    pick = bC
    cfail = {}
    ContinueOnError = {}
    FailSet = {bA}
    MaxConc = 3
    MaxCrashes = 0
    Suspendable = {}
    TimerNodes = {}
    MaxTick = 0

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    WaitingSound
    NoDoubleFire
    NoSignalLost
    NoDoubleApply
    SuspendPreservesJournal
    NoResurrection
    ExactlyOneBranchTaken
    MergeFiresIffTakenTailComplete
    BypassedNeverRuns
    BypassVsFailureSeparator
    ChoiceFailureSkipsNotBypasses

PROPERTIES
    Termination
    WokeOnlyWhenReady
