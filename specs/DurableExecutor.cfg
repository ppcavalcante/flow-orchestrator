\* TLC config (run against MCDurableExecutor.tla) — continue-on-error + crash:
\* n2 is continue-on-error and FAILS; a single crash may occur at any point.
\* Diamond  n1 -> {n2, n3} -> n4.  n4 still runs (the coe-failed n2 is resolved,
\* DEC-P21-depguard), and resume-equivalence + no-double-commit hold across the
\* crash. Exercises the durable model on the coe-unblock arm.
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {n2}
    FailSet = {n2}
    MaxConc = 2
    MaxCrashes = 1

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    StatusConvergence

PROPERTIES
    Termination
