\* SEED-BREAK (AtMostOneClaimedWriter): WinnerUnique=FALSE lets two procs share the winning token →
\* two claimed writers hold the current token at once → AtMostOneClaimedWriter FALSIFIES.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2}
    MaxToken = 3
    TokenGuard = TRUE
    TerminalReclaimBlocked = TRUE
    ReclaimEnabled = TRUE
    WinnerUnique = FALSE
    CancelGate = TRUE
INVARIANTS
    AtMostOneClaimedWriter
