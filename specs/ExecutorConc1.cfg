\* TLC config (run against MCExecutor.tla) — concurrency-bound scenario at MaxConc=1.
\* Same diamond  n1 -> {n2, n3} -> n4, but MaxConc=1 (< the max level width of 2).
\* This makes the ConcurrencyBound check NON-VACUOUS: baseline holds (only 1 node
\* runs at a time), and removing the `Cardinality(Running) < MaxConc` guard from
\* Start lets n2+n3 both run -> Running=2 > 1 -> ConcurrencyBound VIOLATED.
\* (At MaxConc >= max level width the bound cannot be exceeded, so that mutation is
\* vacuous there -- this config is what makes the mutation actually bite.)
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {}
    FailSet = {}
    MaxConc = 1

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound

PROPERTIES
    Termination
