\* TLC config (run against MCM10FailResume.tla) — the ph39 T5 plain-resume-of-a-
\* hard-failed-run scenario (closes FIND-M10-P36-T2, DEC-M10-P39-T5 Option A).
\* nF hard-fails; nD (its dependent) Skips; nT (independent timer) parks then completes.
\* A Crash + Recover starts a fresh attempt (halted resets): nF stays Failed
\* (NoResurrection), nD stays Skipped, the independent overdue nT completes — exactly
\* the Go per-attempt fail-fast behavior. Exhaustive at MaxCrashes=1.
SPECIFICATION Spec

CONSTANTS
    nF = nF
    nD = nD
    nT = nT
    ContinueOnError = {}
    FailSet = {nF}
    MaxConc = 2
    MaxCrashes = 1
    Suspendable = {nT}
    TimerNodes = {nT}
    MaxTick = 2

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    WaitingSound
    NoDoubleFire
    NoSignalLost
    NoDoubleApply
    SuspendPreservesJournal
    NoResurrection

PROPERTIES
    Termination
    WokeOnlyWhenReady
