\* M20 ph102 scheduling arm — the CORRECT model. NoDoubleFire (the in-txn re-check + atomic advance
\* is the arbiter, DEC-P100-RECHECK-IS-ARBITER) must HOLD, exhaustive at {p1,p2,p3} x MaxSlot=3.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2, p3}
    MaxSlot = 3
    Recheck = TRUE
INVARIANTS
    TypeOK
    NoDoubleFire
