\* M15 ph71 — BONUS depth: MaxCrashes=2 (crash mid-resume, then crash again). Kept
\* tractable by the same small bound (Levels=3 x RowsPerLevel=2). Confirms the crash-
\* atomicity holds under repeated crashes; all three invariants hold. Correct store
\* (Seed="none").
SPECIFICATION Spec
CONSTANTS
    Levels = 3
    RowsPerLevel = 2
    MaxCrashes = 2
    Seed = "none"
INVARIANTS
    TypeOK
    INV_NoPartialLevel
    INV_PrefixClosed
    INV_NoCommittedLoss
