\* M15 ph71 — the TORN BITE (INV_NoPartialLevel). Seed="torn" makes CommitRows drop a
\* level's last row, landing a PROPER SUBSET of the level's rows durably. INV_NoPartialLevel
\* MUST Falsify — this is the multi-row-torn bite the ph65 INTEGER frontier could NOT express
\* (an integer "committed = L-1" cannot represent "half of level L landed"). The OTHER two
\* invariants stay clean under this seed (the break is ISOLATED). Required outcome: RED on
\* INV_NoPartialLevel. A GREEN here would mean the invariant has no teeth.
SPECIFICATION Spec
CONSTANTS
    Levels = 3
    RowsPerLevel = 2
    MaxCrashes = 1
    Seed = "torn"
INVARIANTS
    TypeOK
    INV_NoPartialLevel
    INV_PrefixClosed
    INV_NoCommittedLoss
