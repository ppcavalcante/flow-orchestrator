\* fails, INV-01), swDeep (at the depth ceiling -> DepthRefuse, BoundedNesting). MaxCrashes
\* = 1 is the exhaustive config — the crash x spawn x park/wake composition, incl. the
\* spawn-idempotency-across-resume that NoDoubleSpawn witnesses (DEC-P96-BASE / -DISCRIMINATOR).
