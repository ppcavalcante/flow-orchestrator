\* TLC config (run against MCM10DurableExecutor.tla) — the M10 suspend/re-enter
\* core extended with the phase-37 SIGNAL dimension. Diamond n1 -> {n2, n3} -> n4:
\* n2 is the declared TIMER suspension node (wakes via the clock crossing FireAt),
\* n3 is the declared SIGNAL suspension node (wakes via a delivered mailbox signal
\* — SendSignal -> Consume -> Ack), n4 is the join depending on BOTH. So the model
\* exercises a timer-park AND a signal-park converging at one join. No failures;
\* EXHAUSTIVE UNDER ONE CRASH (MaxCrashes = 1 — the phase-39 capstone: the
\* crash×suspend×signal composition + crash-faithful wakeReady re-derivation on
\* Recover are now machine-checked, ~14,380 distinct states). A signal that never arrives leaves n3 (and n4) in a
\* legitimately-Settled parked state (anti-hollow); a delivered signal drives n3 to
\* completion and the run drains.
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {}
    FailSet = {}
    MaxConc = 2
    MaxCrashes = 1
    Suspendable = {n2, n3}
    TimerNodes = {n2}
    MaxTick = 2

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    WaitingSound
    NoDoubleFire
    NoSignalLost
    NoDoubleApply
    SuspendPreservesJournal
    NoResurrection
    \* M11 OR-join invariants — vacuously true here (ChoiceNodes=MergeNodes={}),
    \* carried to confirm they are safe on the unchanged M10 diamond (phase 44).
    ExactlyOneBranchTaken
    MergeFiresIffTakenTailComplete
    BypassedNeverRuns
    BypassVsFailureSeparator
    ChoiceFailureSkipsNotBypasses

PROPERTIES
    Termination
    WokeOnlyWhenReady
