\* TLC config (run against MCDurableExecutor.tla) — hard-failure + crash:
\* n2 is a normal (non-coe) node and FAILS; a single crash may occur at any point.
\* Diamond  n1 -> {n2, n3} -> n4.  n2 fails -> halted (fail-fast); n4 depends on
\* the hard-failed n2, so it is skipped. Across a crash, halted is re-derived from
\* the reloaded journal, the failure stays observed, and n4 stays skipped (the
\* failure-safety + SkippedSound discipline survives crash/recover).
SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    ContinueOnError = {}
    FailSet = {n2}
    MaxConc = 2
    MaxCrashes = 1

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    StatusConvergence

PROPERTIES
    Termination
