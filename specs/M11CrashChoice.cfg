\* M11 crash x choice config (run against MCM11CrashChoice.tla) — phase 44,
\* DEC-M11-P44-CRASHCHOICE. Single Choice c / 2 branches {bA,bB} / Merge m over
\* both, under ONE crash. FailSet={bA}. Proves the OR-join composes with
\* crash-resume: bypass survives Recover; a taken-tail failure still blocks the
\* merge post-crash (the separator holds across a crash).
SPECIFICATION Spec

CONSTANTS
    c = c
    bA = bA
    bB = bB
    m = m
    pick = bA
    cfail = {}
    ContinueOnError = {}
    FailSet = {bA}
    MaxConc = 2
    MaxCrashes = 1
    Suspendable = {}
    TimerNodes = {}
    MaxTick = 0

INVARIANTS
    TypeOK
    ConcurrencyBound
    DepsBeforeRun
    HardFailureHalts
    SkippedSound
    ExecFidelity
    NoDoubleCommit
    WaitingSound
    NoDoubleFire
    NoSignalLost
    NoDoubleApply
    SuspendPreservesJournal
    NoResurrection
    ExactlyOneBranchTaken
    MergeFiresIffTakenTailComplete
    BypassedNeverRuns
    BypassVsFailureSeparator
    ChoiceFailureSkipsNotBypasses

PROPERTIES
    Termination
    WokeOnlyWhenReady
