\* SEED-BREAK (C2): TerminalReclaimBlocked=FALSE lets the reclaim scan match a terminal row →
\* a done/failed row is pulled back to claimed → NoReclaimOfTerminal FALSIFIES.
SPECIFICATION Spec
CONSTANTS
    Procs = {p1, p2}
    MaxToken = 3
    TokenGuard = TRUE
    TerminalReclaimBlocked = FALSE
    ReclaimEnabled = TRUE
    WinnerUnique = TRUE
INVARIANTS
    NoReclaimOfTerminal
