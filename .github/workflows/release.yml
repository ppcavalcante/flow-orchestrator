name: Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege: read-only at the top level; each job widens only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release + upload assets
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler

      - name: Generate FlatBuffers code
        run: make generate-fb

      - name: Run Tests
        run: go test -v ./...

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: flow-orchestrator.spdx.json

      # Digest of the released artifact, base64-encoded, for the SLSA generator.
      - name: Compute artifact digest for provenance
        id: hash
        run: echo "hashes=$(sha256sum flow-orchestrator.spdx.json | base64 -w0)" >> "$GITHUB_OUTPUT"

      # Extract version from tag
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: true  # Set to true for alpha/beta releases
          files: flow-orchestrator.spdx.json
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

  # SLSA provenance generation. This is a library (no built binary), so we use the
  # GENERIC generator to attest the released artifact (the SBOM) by its digest —
  # not the Go *builder*, which expects a binary to compile. NOTE: the generator is
  # referenced by its semantic tag @v2.1.0, NOT a commit SHA — SLSA's threat model
  # requires the tag for provenance-generator identity verification; SHA-pinning it
  # breaks the chain.
  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write   # OIDC token for keyless provenance signing
      contents: write   # attach the provenance attestation to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true   # attach the .intoto.jsonl provenance to the GitHub release
