name: CI

on:
  push:
    branches: [ anvil-m1, main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.24.x = the go.mod floor (lowest supported); 1.25.x = the dev/build
        # toolchain. Testing both catches "used a 1.25-only feature while
        # declaring 1.24". 1.25.x is pinned to a patched release (>=1.25.11,
        # the govulncheck stdlib-advisory ceiling) — see DEC-M5-toolchain.
        go: [ '1.24.x', '1.25.11' ]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: Build
        run: go build -v ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt (fail if any file is unformatted)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: Test (race)
        run: go test ./... -race
      - name: govulncheck (symbol-scan blocking)
        run: |
          # Pin the gate tool itself (A2) — @latest would let the scanner drift,
          # making a green/red result non-reproducible across runs.
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          # Blocking on CALLED vulnerabilities (symbol scan). Uncalled module /
          # imported findings are report-only and must not wedge CI; -scan=symbol
          # is the default, the gate is the exit code on a called vuln.
          govulncheck ./...

  lint:
    name: Lint (golangci-lint v2.12.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          # Pinned to the repo-canonical version (matches Makefile GOLANGCI_LINT_VERSION)
          # so CI == local. The 4-milestone "dark lint" was this job floating `latest`
          # (which ran v1 against a v2 config) plus CI never triggering on the branch.
          version: v2.12.2
          args: --timeout=5m --issues-exit-code=1

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: Install bc
        run: sudo apt-get install -y bc
      - name: Generate focused coverage report
        run: make test-coverage-focused
      - name: Generate coverage report
        run: make coverage-report
      - name: Check coverage thresholds
        # Backed by the T7-fixed check_coverage.sh: a failing test suite now
        # exits non-zero (the swallow-bug is fixed) so this is a real gate.
        run: ./scripts/testing/check_coverage.sh
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          # fail_ci_if_error stays false: a Codecov upload hiccup must not fail CI
          # (the real coverage gate is check_coverage.sh above, not the upload).
          fail_ci_if_error: false
      - name: Archive coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-reports
          path: |
            coverage-focused.txt
            coverage-focused.html

  fuzz:
    name: Fuzz (bounded discovery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: Fuzz FlatBuffersStore.Load (bounded)
        # Structural evidence artifact, NOT a Decision gate: a crash fails the job,
        # but "no crash found in 60s" is an existential non-finding, never a proof.
        # The durable gate is the committed seed-corpus replay in the race test job.
        run: go test ./pkg/workflow/ -run='^$' -fuzz='^FuzzFlatBuffersStoreLoad$' -fuzztime=60s

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: Build
        run: go build -v ./...
      - name: Run examples
        run: |
          for example in $(find examples -name "main.go" -not -path "*/\.*" | sort); do
            dir=$(dirname $example)
            echo "Running example: $dir"
            cd $dir && go build -v && cd -
          done

  mutation:
    name: Mutation testing (informational, non-blocking)
    runs-on: ubuntu-latest
    # NON-BLOCKING by design: mutation testing is the rung above coverage% but is
    # too slow and too sensitive to equivalent-mutant churn to gate the build on.
    # continue-on-error makes the job report its result without ever failing CI —
    # it exists to surface NEW real test gaps over time (read the log, don't trust
    # the exit code). See docs/development/mutation_testing.md for the accepted-
    # survivor baseline + how to triage.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true
      - name: Install FlatBuffers compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y flatbuffers-compiler
      - name: Generate FlatBuffers code
        run: make generate-fb
      - name: Run go-gremlins (scoped to .gremlins.yaml)
        # gremlins is a DEV tool — pinned via `go run @v0.6.0`, NOT added to go.mod.
        # Two flags are load-bearing (see docs/development/mutation_testing.md):
        #   * config .gremlins.yaml scopes mutation to the 6 core files. Its
        #     exclude-files patterns are RELATIVE TO THE RUN TARGET (./pkg/workflow),
        #     e.g. "action.go" / "metrics/.*\.go" — NOT "pkg/workflow/action.go".
        #   * --timeout-coefficient 60: gremlins derives the per-mutant timeout
        #     from its ~1s coverage run, not the ~13s real suite (gopter property
        #     suites dominate). The default 3x times out EVERY mutant (false 0%);
        #     60x (~69s budget) clears the real suite.
        run: |
          go run github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0 \
            unleash --config .gremlins.yaml --timeout-coefficient 60 ./pkg/workflow
