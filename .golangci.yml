version: "2"

formatters:
  enable:
    - gofmt
    - goimports
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(flow-orchestrator)

linters:
  enable:
    - govet
    - errcheck
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - noctx
    - revive
    - misspell
    - prealloc
    - copyloopvar
    - predeclared
    - gocritic
    - nilnil
    - errorlint
    - thelper
    - tparallel

  settings:
    gosec:
      excludes:
        - G204

    govet:
      settings:
        printf:
          funcs:
            - Debugf
            - Infof
            - Warnf
            - Errorf
            - Fatalf

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*testing.T).Error
        - (*testing.T).Fatal
        - (*testing.T).Fatalf
        - (*testing.T).Errorf

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: unused-parameter
          severity: warning
          disabled: false
        - name: error-strings
          severity: warning
          disabled: false
        - name: error-return
          severity: warning
          disabled: false
        - name: if-return
          severity: warning
          disabled: false
        - name: increment-decrement
          severity: warning
          disabled: false

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    rules:
      # Exclude linters for test files. NOTE: staticcheck + errcheck are
      # intentionally NOT excluded (M5/Phase 14.1 A3 de-blinding) — the gate must
      # be real on test files too for those two, closing the hole that let the
      # SEC-01 SA4000 tautology slip. The remaining ~16 stay excluded this round.
      - path: _test\.go
        linters:
          - gocyclo
          - gosec
          - unused
          - govet
          - ineffassign
          - revive
          - noctx
          - bodyclose
          - gocritic
          - nilnil
          - errorlint
          - thelper
          - tparallel
          - copyloopvar
          - prealloc
          - predeclared
      # Exclude linters for benchmark files. NOTE: errcheck is intentionally NOT
      # excluded here (M5/Phase 14 de-suppression) — unchecked LoadSnapshot/
      # AddNode/AddDependency returns silently invalidate a benchmark, so errcheck
      # is a real gate in benchmark/ too; the meaningful returns are now checked.
      - path: benchmark
        linters:
          - prealloc
          - gosec
          - revive
          - unused
          - thelper
          - copyloopvar
          - staticcheck
          - gocritic
      # Exclude linters for example files
      - path: examples/
        linters:
          - gosec
          - revive
          - errcheck
          - staticcheck
          - gocritic
          - predeclared
      # Suppress stuttering type name warnings for public API types
      - text: "stutters"
        linters:
          - revive
    paths:
      - tests/testdata

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  go: '1.24'
